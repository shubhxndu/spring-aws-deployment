spring.application.name=aws-assignment-task-api

server.port=${PORT:8080}

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:taskdb}
spring.datasource.username=${DB_USERNAME:appadmin}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

app.seed-data.enabled=${SEED_DATA_ENABLED:true}

logging.level.root=INFO
logging.level.com.example=INFO
